name: HeroStar CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --ignore-scripts --no-audit --no-fund
      - name: Run tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          npm test > /tmp/herostar-tests.log 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: herostar-test-log
          path: /tmp/herostar-tests.log
          if-no-files-found: error
      - name: Fail when tests failed
        if: steps.tests.outputs.exit_code != '0'
        run: exit 1
      - name: Syntax check
        run: |
          node --check server.js
          for file in public/*.js; do node --check "$file"; done
          for file in src/*.js; do node --check "$file"; done
