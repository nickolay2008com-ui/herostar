name: HeroStar CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --ignore-scripts --no-audit --no-fund
      - name: Run tests
        shell: bash
        run: |
          if npm test > /tmp/herostar-tests.log 2>&1; then
            tail -40 /tmp/herostar-tests.log
          else
            tail -180 /tmp/herostar-tests.log
            exit 1
          fi
      - name: Syntax check
        run: |
          node --check server.js
          for file in public/*.js; do node --check "$file"; done
          for file in src/*.js; do node --check "$file"; done
