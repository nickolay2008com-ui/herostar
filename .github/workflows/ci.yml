name: HeroStar CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --ignore-scripts --no-audit --no-fund
      - name: Run tests with report
        shell: bash
        run: |
          set +e
          npm test > /tmp/herostar-test.log 2>&1
          code=$?
          echo "$code" > /tmp/herostar-test-exit.txt
          tail -n 120 /tmp/herostar-test.log
          exit 0
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: herostar-test-report
          path: |
            /tmp/herostar-test.log
            /tmp/herostar-test-exit.txt
      - name: Enforce test result
        shell: bash
        run: |
          code=$(cat /tmp/herostar-test-exit.txt)
          exit "$code"
      - name: Syntax check
        run: |
          node --check server.js
          for file in public/*.js; do node --check "$file"; done
          for file in src/*.js; do node --check "$file"; done
