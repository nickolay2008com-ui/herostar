name: Apply launch quality

on:
  push:
    branches: [codex/herostar-launch-quality]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/herostar-launch-quality
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node .github/scripts/apply-launch-quality.mjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Довести мобильную читаемость и Lighthouse до запуска"
          git push origin HEAD:codex/herostar-launch-quality
