name: Source bundle

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build source archive
        run: tar --exclude=.git -czf source-bundle.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: source-bundle
          path: source-bundle.tar.gz
          retention-days: 1
