name: Apply clone monetization

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply approved implementation
        shell: bash
        run: |
          set -euo pipefail
          cat .github/implementation-parts/part-* \
              .github/implementation-rem/rem-0[0-2] \
              .github/implementation-tail/tail-* \
            | base64 -d > /tmp/implementation.tar.gz
          echo "4e5de6a355ed45b9c7b3932d30e684ee25c9055d234c960318471585c2ee3dca  /tmp/implementation.tar.gz" \
            | sha256sum -c -
          tar -xzf /tmp/implementation.tar.gz
          base64 -d .github/implementation-fixes/clone-launch.test.js.b64 > test/clone-launch.test.js

          rm -f public/clone-conversion-hotfix.js
          rm -f public/clone-product-bridge.js
          rm -f test/clone-conversion-hotfix.test.js
          rm -rf .github/implementation-parts
          rm -rf .github/implementation-rem
          rm -rf .github/implementation-bundle
          rm -rf .github/implementation-tail
          rm -rf .github/implementation-fixes
          rm -f .github/workflows/source-bundle.yml

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Run tests
        id: tests
        continue-on-error: true
        shell: bash
        run: npm test > /tmp/test-output.txt 2>&1

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monetization-test-output
          path: /tmp/test-output.txt
          retention-days: 1

      - name: Require passing tests
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.tests.outcome }}" != "success" ]; then
            tail -n 180 /tmp/test-output.txt
            exit 1
          fi
          tail -n 40 /tmp/test-output.txt

      - name: Check syntax
        shell: bash
        run: |
          set -euo pipefail
          node --check server.js
          for file in src/*.js public/clone.js; do
            node --check "$file"
          done

      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "HeroStar Council"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Встроить День клона и Сонастройку"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
