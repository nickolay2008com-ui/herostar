name: Validate opportunity guides

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install --no-audit --no-fund
      - name: Run focused tests
        run: node --test test/opportunity-guides.test.js > opportunity-test-output.txt 2>&1
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opportunity-test-output
          path: opportunity-test-output.txt
