name: Apply clone free unlimited

on:
  push:
    branches:
      - codex/clone-free-unlimited
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/clone-free-unlimited
          fetch-depth: 0
          show-progress: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Verify and apply approved change
        run: |
          set -euo pipefail
          cat .github/clone-free-unlimited/chunk-* | base64 -d > /tmp/change.patch.xz
          echo "bd9c2b131abf39fc888e1c98a611a871206f903ea219da3312ab22edd4588b1e  /tmp/change.patch.xz" | sha256sum -c -
          xz -t /tmp/change.patch.xz
          xz -dc /tmp/change.patch.xz > /tmp/change.patch
          git apply --3way --check /tmp/change.patch
          git apply --3way /tmp/change.patch
          echo '' | base64 -d > test/clone-free-unlimited.test.js
          rm -rf .github/clone-free-unlimited
          rm -f .github/workflows/clone-free-unlimited-bundle.yml

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Run full test suite
        run: npm test

      - name: Check syntax and canonical clone page
        run: |
          set -euo pipefail
          node --check server.js
          node --check src/auth.js
          node --check src/clone-quota.js
          node --check src/consultation-profiles.js
          node --check src/ai.js
          node --check public/clone.js
          node --check test/clone-free-unlimited.test.js
          cmp public/clone.html public/clone/index.html

      - name: Commit verified implementation
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Разрешить свободный бесплатный диалог после Telegram"
          git push origin HEAD:codex/clone-free-unlimited
