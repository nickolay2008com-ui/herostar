name: Clone free unlimited bundle

on:
  push:
    branches:
      - codex/clone-free-unlimited
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build source archive
        run: tar --exclude=.git --exclude=.github/workflows/clone-free-unlimited-bundle.yml -czf /tmp/herostar-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: herostar-source
          path: /tmp/herostar-source.tar.gz
          retention-days: 1
