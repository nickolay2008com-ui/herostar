name: Diagnose clone free unlimited

on:
  push:
    branches:
      - codex/clone-free-unlimited
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/clone-free-unlimited
          fetch-depth: 0
          show-progress: false

      - name: Apply approved change
        run: |
          set -euo pipefail
          cat .github/clone-free-unlimited/chunk-* | base64 -d > /tmp/change.patch.xz
          echo "bd9c2b131abf39fc888e1c98a611a871206f903ea219da3312ab22edd4588b1e  /tmp/change.patch.xz" | sha256sum -c -
          xz -dc /tmp/change.patch.xz > /tmp/change.patch
          git apply --3way /tmp/change.patch

      - name: Diagnose checks
        shell: bash
        run: |
          set +e
          : > /tmp/clone-checks.txt
          for command in \
            "node --check server.js" \
            "node --check src/auth.js" \
            "node --check src/clone-quota.js" \
            "node --check src/consultation-profiles.js" \
            "node --check src/ai.js" \
            "node --check public/clone.js" \
            "node --check test/clone-free-unlimited.test.js" \
            "cmp public/clone.html public/clone/index.html"; do
              echo "COMMAND: $command" >> /tmp/clone-checks.txt
              bash -lc "$command" >> /tmp/clone-checks.txt 2>&1
              echo "EXIT: $?" >> /tmp/clone-checks.txt
            done
          cat /tmp/clone-checks.txt

      - uses: actions/upload-artifact@v4
        with:
          name: clone-checks
          path: /tmp/clone-checks.txt
          retention-days: 1
