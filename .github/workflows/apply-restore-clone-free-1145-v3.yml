name: Apply restored clone free 1145 v3

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/restore-clone-free-1145
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Apply approved restoration
        run: |
          python3 <<'PY'
          from pathlib import Path
          from textwrap import dedent
          text = Path('.github/workflows/restore-clone-free-1145.yml').read_text()
          marker = "          node <<'NODE'\n"
          start = text.index(marker) + len(marker)
          end = text.index("\n          NODE", start)
          Path('/tmp/restore.js').write_text(dedent(text[start:end]))
          PY
          node /tmp/restore.js

      - name: Write stable verification tests
        run: |
          cat > test/clone-free-unlimited.test.js <<'EOF'
          // Бесплатный режим ограничивает только анонимное знакомство, а не разговор после сохранения.
          import test from 'node:test';
          import assert from 'node:assert/strict';
          import { readFile } from 'node:fs/promises';

          const read = (path) => readFile(new URL(`../${path}`, import.meta.url), 'utf8');

          test('анонимный пользователь получает три ответа, а Telegram снимает продуктовый лимит', async () => {
            const [auth, server, clone] = await Promise.all([
              read('src/auth.js'),
              read('server.js'),
              read('public/clone.js'),
            ]);

            assert.ok(auth.includes('CLONE_ANONYMOUS_QUESTION_LIMIT = 3'));
            assert.ok(auth.includes('if (req.user) return'));
            assert.ok(auth.includes('userId: null'));
            assert.ok(auth.includes('CLONE_TELEGRAM_REQUIRED'));
            assert.ok(server.includes("app.post('/api/consult', consultLimiter, async"));
            assert.ok(server.includes("if (!req.user && product !== 'clone')"));
            assert.ok(clone.includes('FREE_PREAUTH_QUESTIONS = 3'));
            assert.ok(clone.includes('Бесплатный режим · сообщения без лимита'));
            assert.ok(!clone.includes("openPaywall('clone_day');\n  return false"));
          });

          test('бесплатный профиль восстановлен из 11:45 и получает полную карту', async () => {
            const [profiles, ai] = await Promise.all([
              read('src/consultation-profiles.js'),
              read('src/ai.js'),
            ]);

            assert.ok(profiles.includes("promptVersion: '2026-07-23.1145'"));
            assert.ok(profiles.includes("sourceCommit: 'ad915b2bf870b27552eaf185a842702987d80da1'"));
            assert.ok(profiles.includes('2–4 конкретных фактора карты'));
            assert.ok(!profiles.includes("chartDepth: 'core'"));
            assert.equal(profiles.split("chartDepth: 'full'").length - 1, 2);
            assert.ok(ai.includes('northNode: chart.northNode'));
            assert.ok(ai.includes('aspects: chart.aspects'));
            assert.ok(ai.includes('compactChart(chart, profile)'));
          });

          test('платное предложение показывается добровольно и честно объясняет углубление', async () => {
            const [html, clone] = await Promise.all([
              read('public/clone.html'),
              read('public/clone.js'),
            ]);

            assert.ok(html.includes('id="fullModeOffer"'));
            assert.ok(html.includes('Бесплатный режим уже опирается на полную карту'));
            assert.ok(html.includes('Глубокий разбор 3–6 значимых связей'));
            assert.ok(clone.includes('state.questionCount >= 5'));
            assert.ok(clone.includes('openFullModeOffer'));
          });
          EOF

          cat > test/consultation-profile.test.js <<'EOF'
          import assert from 'node:assert/strict';
          import { readFileSync } from 'node:fs';
          import test from 'node:test';

          import { consultationSystemPrompt } from '../src/ai.js';
          import {
            CLONE_FREE_PROFILE_ID,
            CLONE_PREMIUM_PROFILE_ID,
            prepareConsultationQuestion,
            resolveConsultationProfile,
          } from '../src/consultation-profiles.js';

          const serverSource = readFileSync(new URL('../server.js', import.meta.url), 'utf8');

          test('бесплатный клон точно использует механику диалога 23 июля 11:45', () => {
            const profile = resolveConsultationProfile({ product: 'clone', premium: false });
            const question = prepareConsultationQuestion(profile, 'Войти ли в новый проект?');

            assert.equal(profile.id, CLONE_FREE_PROFILE_ID);
            assert.equal(profile.promptVersion, '2026-07-23.1145');
            assert.equal(profile.sourceCommit, 'ad915b2bf870b27552eaf185a842702987d80da1');
            assert.ok(question.includes('Рассмотри описанную ситуацию не как прогноз поступка человека'));
            assert.ok(question.includes('2–4 конкретных фактора карты'));
            assert.ok(question.includes('аспект, ретроградность, ASC/DSC, MC/IC'));
            assert.equal(profile.chartDepth, 'full');
            assert.deepEqual(profile.factorBudget, { min: 2, max: 4 });
            assert.equal(profile.historyLimit, 8);
            assert.ok(question.includes('Ситуация: Войти ли в новый проект?'));

            const prompt = consultationSystemPrompt('deep', 'clone', false);
            assert.ok(prompt.includes('пять ключей HeroStar'));
            assert.ok(!prompt.includes('Режим «Звёздный клон» имеет приоритет'));
          });

          test('платный клон сохраняет углублённый серверный алгоритм', () => {
            const profile = resolveConsultationProfile({ product: 'clone', premium: true });
            const question = prepareConsultationQuestion(profile, 'Войти ли в новый проект?');

            assert.equal(profile.id, CLONE_PREMIUM_PROFILE_ID);
            assert.equal(question, 'Войти ли в новый проект?');

            const prompt = consultationSystemPrompt('deep', 'clone', true);
            assert.ok(prompt.includes('пять ключей HeroStar'));
            assert.ok(prompt.includes('Режим «Звёздный клон» имеет приоритет'));
            assert.ok(prompt.includes('карту как единую сеть'));
            assert.ok(prompt.includes('3–6 наиболее значимых связей'));
            assert.equal(profile.chartDepth, 'full');
            assert.deepEqual(profile.factorBudget, { min: 3, max: 6 });
            assert.equal(profile.historyLimit, 16);
          });

          test('уровень доступа выбирается только на сервере', () => {
            assert.ok(serverSource.includes('const premium = req.user ? hasCloneAccessForChart(req.user, record.id) : false'));
            const answerCall = serverSource.slice(serverSource.indexOf('answerConsultation({'), serverSource.indexOf('answerConsultation({') + 500);
            assert.ok(answerCall.includes('product'));
            assert.ok(answerCall.includes('premium'));
          });

          test('обычная консультация HeroStar не получает профиль клона', () => {
            assert.equal(resolveConsultationProfile({ product: 'herostar', premium: true }), null);
            assert.ok(consultationSystemPrompt('deep', 'herostar', true).includes('пять ключей HeroStar'));
            assert.ok(!consultationSystemPrompt('deep', 'herostar', true).includes('Режим «Звёздный клон»'));
          });
          EOF

      - run: npm install --ignore-scripts --no-audit --no-fund
      - name: Run full test suite
        run: npm test
      - name: Check syntax and canonical clone page
        run: |
          node --check src/consultation-profiles.js
          node --check public/clone.js
          node --check test/consultation-profile.test.js
          node --check test/clone-free-unlimited.test.js
          cmp public/clone.html public/clone/index.html

      - name: Commit verified restoration
        run: |
          rm .github/workflows/restore-clone-free-1145.yml
          rm .github/workflows/restore-clone-free-1145-pr.yml
          rm .github/workflows/diagnose-restore-clone-free-1145.yml
          rm .github/workflows/apply-restore-clone-free-1145-v2.yml
          rm .github/workflows/diagnose-restore-clone-free-1145-v2.yml
          rm .github/workflows/apply-restore-clone-free-1145-v3.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/consultation-profiles.js public/clone.js public/clone.html public/clone/index.html test/consultation-profile.test.js test/clone-free-unlimited.test.js .github/workflows
          git commit -m "Вернуть бесплатному Клону механику 2026-07-23.1145"
          git push origin HEAD:codex/restore-clone-free-1145
