name: Apply clone stage A

on:
  push:
    branches:
      - codex/clone-stage-a-safety
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/clone-stage-a-safety
          fetch-depth: 0

      - name: Export assembled Stage A patch payload
        run: |
          set -euo pipefail
          wc -c .github/stage-a-patch/chunk-* > /tmp/stage-a-chunk-sizes.txt
          sha256sum .github/stage-a-patch/chunk-* > /tmp/stage-a-chunk-hashes.txt
          cat .github/stage-a-patch/chunk-* > /tmp/stage-a-patch.b64
          wc -c /tmp/stage-a-patch.b64 >> /tmp/stage-a-chunk-sizes.txt
          sha256sum /tmp/stage-a-patch.b64 >> /tmp/stage-a-chunk-hashes.txt

      - uses: actions/upload-artifact@v4
        with:
          name: stage-a-patch-payload
          path: |
            /tmp/stage-a-patch.b64
            /tmp/stage-a-chunk-sizes.txt
            /tmp/stage-a-chunk-hashes.txt
          retention-days: 1
