name: Apply clone stage A

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/clone-stage-a-safety
          fetch-depth: 0

      - name: Reconstruct audit payload
        run: |
          set -euo pipefail
          ls -l .github/stage-a-payload
          cat .github/stage-a-payload/part-* > /tmp/stage-a.b64
          wc -c /tmp/stage-a.b64
          base64 -d /tmp/stage-a.b64 > /tmp/stage-a.tar.gz
          sha256sum /tmp/stage-a.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: stage-a-reconstructed
          path: |
            /tmp/stage-a.b64
            /tmp/stage-a.tar.gz
          retention-days: 1
