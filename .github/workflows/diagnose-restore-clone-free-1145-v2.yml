name: Diagnose restored clone free 1145 v2

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/restore-clone-free-1145
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply restoration and test fixes
        run: |
          python3 <<'PY'
          from pathlib import Path
          from textwrap import dedent
          text = Path('.github/workflows/restore-clone-free-1145.yml').read_text()
          marker = "          node <<'NODE'\n"
          start = text.index(marker) + len(marker)
          end = text.index("\n          NODE", start)
          Path('/tmp/restore.js').write_text(dedent(text[start:end]))
          PY
          node /tmp/restore.js
          python3 <<'PY'
          from pathlib import Path
          path = Path('test/clone-free-unlimited.test.js')
          text = path.read_text().replace(
              "  assert.match(server, /app.post('/api/consult', consultLimiter, async/);",
              "  assert.ok(server.includes(\"app.post('/api/consult', consultLimiter, async\"));",
          )
          path.write_text(text)
          path = Path('test/consultation-profile.test.js')
          text = path.read_text().replace(
              "  assert.match(question, /аспект, ретроградность, ASC/DSC, MC/IC/);",
              "  assert.ok(question.includes('аспект, ретроградность, ASC/DSC, MC/IC'));",
          )
          path.write_text(text)
          PY
      - run: npm install --ignore-scripts --no-audit --no-fund
      - name: Capture complete diagnostics
        run: |
          set +e
          node --check test/clone-free-unlimited.test.js > /tmp/syntax-clone.txt 2>&1
          echo $? > /tmp/syntax-clone-code.txt
          node --check test/consultation-profile.test.js > /tmp/syntax-profile.txt 2>&1
          echo $? > /tmp/syntax-profile-code.txt
          npm test > /tmp/test-output-v2.txt 2>&1
          echo $? > /tmp/test-exit-v2.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: restore-1145-diagnostics-v2
          path: |
            /tmp/test-output-v2.txt
            /tmp/test-exit-v2.txt
            /tmp/syntax-clone.txt
            /tmp/syntax-clone-code.txt
            /tmp/syntax-profile.txt
            /tmp/syntax-profile-code.txt
            test/clone-free-unlimited.test.js
            test/consultation-profile.test.js
          retention-days: 1
