name: HeroStar Typography Production Smoke

on:
  pull_request:
    branches: [main]
    paths:
      - test/typography-production-smoke.test.js
      - .github/workflows/typography-production-smoke.yml

permissions:
  contents: read

jobs:
  production-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run typography production checks
        env:
          RUN_TYPOGRAPHY_SMOKE: '1'
        run: node --test test/typography-production-smoke.test.js
