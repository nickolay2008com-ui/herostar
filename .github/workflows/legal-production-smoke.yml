name: HeroStar Legal Production Smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check live production legal pages
        run: node .github/scripts/legal-production-smoke.mjs
        env:
          HEROSTAR_URL: https://herostar.up.railway.app
