name: Diagnose restored clone free 1145

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/restore-clone-free-1145
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply restoration in workspace
        run: |
          python3 <<'PY'
          from pathlib import Path
          from textwrap import dedent
          text = Path('.github/workflows/restore-clone-free-1145.yml').read_text()
          marker = "          node <<'NODE'\n"
          start = text.index(marker) + len(marker)
          end = text.index("\n          NODE", start)
          Path('/tmp/restore.js').write_text(dedent(text[start:end]))
          PY
          node /tmp/restore.js
      - run: npm install --ignore-scripts --no-audit --no-fund
      - name: Capture complete test output
        run: |
          set +e
          npm test > /tmp/test-output.txt 2>&1
          code=$?
          echo "$code" > /tmp/test-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: restore-1145-test-output
          path: |
            /tmp/test-output.txt
            /tmp/test-exit-code.txt
          retention-days: 1
