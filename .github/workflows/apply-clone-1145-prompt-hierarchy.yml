        run: npm test

      - name: Check syntax and diff
        run: |
          node --check src/ai.js
          node --check test/consultation-profile.test.js
          git diff --check

      - name: Commit verified fix and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-clone-1145-prompt-hierarchy.yml
          git add src/ai.js test/consultation-profile.test.js
          git commit -m "Исправить иерархию промпта Клона [prompt-hierarchy-applied]"
          git push origin HEAD:codex/fix-clone-1145-prompt-hierarchy
