name: Campaign readiness test output

on:
  pull_request:
    branches: [main]

jobs:
  test-output:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --ignore-scripts --no-audit --no-fund
      - name: Capture tests
        shell: bash
        run: |
          set +e
          npm test > test-output.txt 2>&1
          code=$?
          echo "$code" > test-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: campaign-test-output
          path: |
            test-output.txt
            test-exit-code.txt
