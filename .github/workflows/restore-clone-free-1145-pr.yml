name: Apply restored clone free 1145

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/restore-clone-free-1145
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Extract and apply approved restoration
        run: |
          python3 <<'PY'
          from pathlib import Path
          from textwrap import dedent

          text = Path('.github/workflows/restore-clone-free-1145.yml').read_text()
          marker = "          node <<'NODE'\n"
          start = text.index(marker) + len(marker)
          end = text.index("\n          NODE", start)
          Path('/tmp/restore-clone-free-1145.js').write_text(dedent(text[start:end]))
          PY
          node /tmp/restore-clone-free-1145.js

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Run full test suite
        run: npm test

      - name: Check syntax and canonical clone page
        run: |
          node --check src/consultation-profiles.js
          node --check public/clone.js
          node --check test/consultation-profile.test.js
          node --check test/clone-free-unlimited.test.js
          cmp public/clone.html public/clone/index.html

      - name: Commit verified restoration
        run: |
          rm .github/workflows/restore-clone-free-1145.yml
          rm .github/workflows/restore-clone-free-1145-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/consultation-profiles.js public/clone.js public/clone.html public/clone/index.html test/consultation-profile.test.js test/clone-free-unlimited.test.js .github/workflows/restore-clone-free-1145.yml .github/workflows/restore-clone-free-1145-pr.yml
          git commit -m "Вернуть бесплатному Клону механику 2026-07-23.1145"
          git push origin HEAD:codex/restore-clone-free-1145
