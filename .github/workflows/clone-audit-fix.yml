name: Clone end-to-end audit fix

on:
  push:
    branches: ["audit/clone-end-to-end"]

permissions:
  contents: write

jobs:
  apply-and-test:
    if: ${{ !contains(github.event.head_commit.message, 'Связать весь сценарий Звёздного клона') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/clone-end-to-end
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply end-to-end fixes
        run: python3 scripts/clone-audit-fix.py
      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Run tests
        run: npm test
      - name: Syntax check
        run: |
          node --check server.js
          for file in public/*.js; do node --check "$file"; done
          for file in src/*.js; do node --check "$file"; done
      - name: Commit verified fixes
        run: |
          git config user.name "chatgpt-codex-connector"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Связать весь сценарий Звёздного клона"
          git push origin HEAD:audit/clone-end-to-end
