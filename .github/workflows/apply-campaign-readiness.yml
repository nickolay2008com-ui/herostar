name: Apply campaign readiness

on:
  push:
    branches: [codex/herostar-campaign-readiness]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/herostar-campaign-readiness
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply root changes
        run: node .github/scripts/apply-campaign-readiness.mjs
      - name: Commit clean result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Подготовить HeroStar к тестовой рекламной кампании"
          git push origin HEAD:codex/herostar-campaign-readiness
